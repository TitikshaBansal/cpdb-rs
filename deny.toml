# cargo-deny configuration — https://embarkstudios.github.io/cargo-deny/
#
# Enforced in CI by `cargo deny check`. Update this file together with
# any new dependency that surfaces a previously-unseen license, advisory,
# or duplicate version.

[graph]
all-features = false
no-default-features = false

[output]
feature-depth = 1

# ─── Advisories ──────────────────────────────────────────────────────────────
[advisories]
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "warn"
ignore = []

# ─── Licenses ────────────────────────────────────────────────────────────────
[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
]
confidence-threshold = 0.8
exceptions = []

# ─── Bans ────────────────────────────────────────────────────────────────────
[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
deny = []
skip = []
skip-tree = []

# ─── Sources ─────────────────────────────────────────────────────────────────
[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
